<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mutual Fund FAQ Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="header-content">
                <h1>HDFC Fund FAQ Assistant</h1>
                <div class="disclaimer-badge">
                    <span class="pulse-dot"></span>
                    Facts-only. No investment advice.
                </div>
            </div>
        </header>

        <!-- Chat Area -->
        <main class="chat-area" id="chat-area">
            <!-- Welcome Card -->
            <div class="message bot-message welcome-card" id="welcome-card">
                <div class="message-bubble">
                    <h3>Hello! 👋</h3>
                    <p>I'm a facts-only assistant for HDFC mutual fund schemes on Groww.</p>
                    <p>You can ask me questions about Expense Ratios, NAV, AUM, Returns, and more.</p>
                    <div class="example-chips">
                        <button class="chip" onclick="window.sendExample('What is the expense ratio of HDFC Small Cap Fund?')">What is the expense ratio of HDFC Small Cap Fund?</button>
                        <button class="chip" onclick="window.sendExample('What is the exit load of HDFC Mid Cap Fund?')">What is the exit load of HDFC Mid Cap Fund?</button>
                        <button class="chip" onclick="window.sendExample('What is the minimum SIP amount for HDFC Large Cap Fund?')">What is the minimum SIP amount for HDFC Large Cap Fund?</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Input Area -->
        <footer class="input-area">
            <form id="chat-form">
                <input type="text" id="query-input" placeholder="Ask a question about HDFC mutual funds..." autocomplete="off" required>
                <button type="submit" id="send-button" aria-label="Send message">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
